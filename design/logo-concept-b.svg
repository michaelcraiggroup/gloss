<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Warm gradient — deeper amber range -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="40%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <!-- Soft background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <!-- Glossy reflection — curved highlight -->
    <radialGradient id="reflection" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Squircle background -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- G letterform: a modern "cut" G — the bar extends past the arc, like a reading cursor -->
  <!-- Outer arc of the C shape -->
  <path d="
    M 320 170
    A 115 115 0 1 0 320 342
  " fill="none" stroke="url(#grad)" stroke-width="48" stroke-linecap="round"/>

  <!-- Horizontal bar — extends inward like a text cursor/reading line -->
  <line x1="320" y1="270" x2="252" y2="270" stroke="url(#grad)" stroke-width="48" stroke-linecap="round"/>

  <!-- Subtle dot accent at the terminal — like a cursor blink -->
  <circle cx="244" cy="270" r="8" fill="#FCD34D" opacity="0.7"/>

  <!-- Glossy reflection overlay -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#reflection)"/>
</svg>
