<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Warm amber-to-gold gradient for the G -->
    <linearGradient id="strokeSheen" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="35%" stop-color="#FBBF24"/>
      <stop offset="65%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <!-- Outer glow behind the G — warm amber bloom -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Radial ambient light on background -->
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(251,191,36,0.12)"/>
      <stop offset="60%" stop-color="rgba(251,191,36,0.04)"/>
      <stop offset="100%" stop-color="rgba(251,191,36,0)"/>
    </radialGradient>
    <!-- Top-left specular highlight -->
    <radialGradient id="specular" cx="30%" cy="25%" r="45%" fx="30%" fy="25%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <clipPath id="squircle">
      <rect x="16" y="16" width="480" height="480" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- Background squircle -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#bgGrad)"/>

  <g clip-path="url(#squircle)">
    <!-- Warm ambient glow on background behind the letter -->
    <rect x="16" y="16" width="480" height="480" fill="url(#ambientGlow)"/>

    <!-- G shape with glow filter -->
    <path d="
      M 310 164
      A 120 120 0 1 0 310 348
      L 310 270
      L 260 270
    " fill="none" stroke="url(#strokeSheen)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- Specular highlight -->
    <rect x="16" y="16" width="480" height="480" fill="url(#specular)"/>
  </g>
</svg>
