<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Warm amber-to-gold gradient for the G -->
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <!-- Curved glossy highlight — top-left radial bloom like light on a polished surface -->
    <radialGradient id="gloss" cx="30%" cy="25%" r="55%" fx="30%" fy="25%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Subtle specular highlight on the G stroke itself -->
    <linearGradient id="strokeSheen" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="40%" stop-color="#FBBF24"/>
      <stop offset="60%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <!-- Background gradient for depth -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <clipPath id="squircle">
      <rect x="16" y="16" width="480" height="480" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- Background squircle -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#bgGrad)"/>

  <g clip-path="url(#squircle)">
    <!-- G shape — thick arc with horizontal bar, open terminal -->
    <path d="
      M 310 164
      A 120 120 0 1 0 310 348
      L 310 270
      L 260 270
    " fill="none" stroke="url(#strokeSheen)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Curved gloss overlay — reads as light catching a polished surface -->
    <rect x="16" y="16" width="480" height="480" fill="url(#gloss)"/>
  </g>
</svg>
